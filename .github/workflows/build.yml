name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-native:
    name: Unit tests (native Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download doctest header
        run: |
          mkdir -p /tmp/doctest/doctest
          curl -fsSL -o /tmp/doctest/doctest/doctest.h \
            https://raw.githubusercontent.com/doctest/doctest/v2.4.11/doctest/doctest.h

      - name: Build unit tests
        run: |
          g++ -std=c++17 \
            -I src/imageviewer \
            -I /tmp/doctest \
            src/tests/test_iwimageformat.cpp \
            -o /tmp/iview_tests

      - name: Run unit tests
        run: /tmp/iview_tests --no-intro

  build-linux:
    name: Build (Linux)
    runs-on: [mingw32, linux, x64]
    env:
      VCPKG_DISABLE_METRICS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x third-party/vcpkg/vcpkg ]; then
            mkdir -p third-party
            pushd third-party
            git clone https://github.com/microsoft/vcpkg --depth 1
            pushd vcpkg
            ./bootstrap-vcpkg.sh --disableMetrics
            popd
            popd
          fi

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          ./prepare_mingw32.sh

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build-mingw32 -j"$(nproc)"

      - name: Package runtime artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -f iview-mingw32.zip

          # Zip only executable + runtime DLLs from the target output directory.
          (
            cd build-mingw32/src/imageviewer
            find . -maxdepth 1 -type f \( -name 'iview.exe' -o -name '*.dll' \) -print | sort | zip -9 -@ "$GITHUB_WORKSPACE/iview-mingw32.zip"
          )

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: iview-mingw32
          path: iview-mingw32.zip
          if-no-files-found: error
