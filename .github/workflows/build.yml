name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: [mingw32, linux, x64]
    env:
      VCPKG_DISABLE_METRICS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x third-party/vcpkg/vcpkg ]; then
            mkdir -p third-party
            pushd third-party
            git clone https://github.com/microsoft/vcpkg --depth 1
            pushd vcpkg
            ./bootstrap-vcpkg.sh --disableMetrics
            popd
            popd
          fi

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          ./prepare_mingw32.sh

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build-mingw32 -j"$(nproc)"

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: iview-mingw32
          path: build-mingw32/src/imageviewer/iview.exe
          if-no-files-found: error
